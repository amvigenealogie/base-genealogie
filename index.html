<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Base de données – Recherche</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f5f5f5;
    color: #222;
}

/* Mode sombre */
body.dark {
    background: #1e1e1e;
    color: #eaeaea;
}

body.dark table {
    background: #2a2a2a;
}

body.dark th {
    background: #333;
}

body.dark td {
    border-color: #555;
}

body.dark a {
    color: #4da3ff;
}

/* Bouton mode sombre */
#darkToggle {
    padding: 8px 12px;
    background: #444;
    color: white;
    border-radius: 4px;
    cursor: pointer;
    margin-bottom: 15px;
}

/* Bouton effacer */
#clearBtn {
    padding: 8px 12px;
    background: #d9534f;
    color: white;
    border-radius: 4px;
    cursor: pointer;
    margin-left: 10px;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    background: white;
}

th, td {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: left;
}

th {
    background: #eee;
}

/* Pagination */
#pagination button {
    margin: 3px;
    padding: 6px 10px;
    cursor: pointer;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
</head>

<body>

<h2>Base de données – Recherche</h2>

<button id="darkToggle">Mode sombre</button>

<br><br>

<input type="text" id="search" placeholder="Rechercher..." style="padding:8px; width:250px;">
<button id="clearBtn">Effacer</button>

<br><br>

<select id="sortColumn">
    <option value="">-- Trier par --</option>
    <option value="num">Numéro</option>
    <option value="pre">Prénom</option>
    <option value="nom">Nom</option>
    <option value="a">Année</option>
    <option value="type">Type</option>
    <option value="source">Source</option>
</select>

<button id="sortOrder">Ordre croissant</button>

<div id="results"></div>
<div id="pagination"></div>

<script src="script.js"></script>

</body>
</html>
